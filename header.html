<header class="site-header">
    <div class="container">
        <a href="{{ .Site.Home.Permalink }}" class="logo">&#127758; {{ .Site.Title }}</a>
        <nav>
            <ul class="lang-switcher">
                {{ range .Site.Languages }}
                <li>
                    <a href="{{ if eq .Lang $.Site.Language.Lang }}#{{ else }}/{{ .Lang }}/{{ end }}"
                       class="{{ if eq .Lang $.Site.Language.Lang }}active{{ end }}">
                       {{ .LanguageName }}
                    </a>
                </li>
                {{ end }}
            </ul>
        </nav>
    </div>
</header>
